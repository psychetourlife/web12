<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการหลังบ้าน | psyche.tourlife</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Prompt', sans-serif; background-color: #FFF4EA; }
        .tab-active { border-bottom: 4px solid #D65D12; color: #2B208B !important; }
    </style>
</head>
<body class="p-4 sm:p-8 flex items-start justify-center min-h-screen relative">
    
    <div id="login-section" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-blue-900/10 self-center">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-[#2B208B]">เข้าสู่ระบบหลังบ้าน</h2>
            <p class="text-gray-500 mt-2 text-sm">กรุณาเข้าสู่ระบบด้วยบัญชี Admin ของคุณ</p>
        </div>
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-2 text-[#2B208B]">Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" class="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-[#D65D12] outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-[#2B208B]">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-[#D65D12] outline-none" required>
            </div>
            <p id="login-error" class="text-red-500 text-sm font-bold hidden text-center"></p>
            <button type="submit" id="login-btn" class="w-full bg-[#2B208B] text-white font-bold py-4 rounded-xl hover:bg-[#D65D12] transition duration-300 shadow-md">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <div id="admin-section" class="hidden w-full max-w-5xl bg-white p-6 sm:p-8 rounded-3xl shadow-xl border border-blue-900/10">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 border-b border-gray-100 pb-4">
            <h1 class="text-xl sm:text-2xl font-bold text-[#2B208B] mb-4 sm:mb-0">ระบบจัดการ psyche.tourlife</h1>
            <div class="flex items-center space-x-4">
                <p id="user-display" class="text-xs font-bold text-[#2B208B] hidden sm:block"></p>
                <button id="logout-btn" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition font-bold text-sm">ออกจากระบบ</button>
            </div>
        </div>

        <div class="flex space-x-8 mb-8 overflow-x-auto border-b border-gray-100">
            <button id="tab-upload" onclick="switchTab('upload')" class="pb-2 font-bold text-[#2B208B] tab-active whitespace-nowrap">เพิ่มบทความ</button>
            <button id="tab-authors" onclick="switchTab('authors')" class="pb-2 font-bold text-gray-400 transition whitespace-nowrap">จัดการผู้เขียน</button>
            <button id="tab-list" onclick="switchTab('list')" class="pb-2 font-bold text-gray-400 transition whitespace-nowrap">รายการบทความ</button>
        </div>
        
        <div id="section-upload" class="tab-content">
            <form id="admin-form" class="space-y-5 max-w-2xl mx-auto">
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#2B208B]">หัวข้อบทความ</label>
                    <input type="text" id="title" class="w-full border border-gray-300 p-3 rounded-xl outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#2B208B]">เลือกผู้เขียน</label>
                    <select id="author-select" class="w-full border border-gray-300 p-3 rounded-xl bg-white" required>
                        <option value="">-- กรุณาเลือกผู้เขียน --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#2B208B]">เนื้อหา / คำโปรย</label>
                    <textarea id="content" rows="4" class="w-full border border-gray-300 p-3 rounded-xl outline-none resize-none" required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#2B208B]">ลิงก์ฉบับเต็ม (Facebook)</label>
                    <input type="url" id="fb-link" class="w-full border border-gray-300 p-3 rounded-xl outline-none" required>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="block text-sm font-bold mb-2 text-[#2B208B]">อัปโหลดรูปหน้าปก</label>
                    <input type="file" id="image-file" accept="image/*" class="w-full text-sm" required>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-[#D65D12] text-white font-bold py-4 rounded-xl hover:bg-[#2B208B] transition">อัปโหลดบทความ</button>
            </form>
        </div>

        <div id="section-authors" class="tab-content hidden">
            <div class="max-w-2xl mx-auto">
                <form id="author-form" class="bg-blue-50 p-6 rounded-2xl mb-8 space-y-4">
                    <input type="text" id="new-author-name" placeholder="ชื่อผู้เขียน" class="w-full border p-3 rounded-xl outline-none" required>
                    <input type="file" id="new-author-image" accept="image/*" class="w-full text-sm" required>
                    <button type="submit" id="author-submit-btn" class="w-full bg-[#2B208B] text-white py-3 rounded-xl font-bold">บันทึกผู้เขียน</button>
                </form>
                <div id="authors-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="section-list" class="tab-content hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="border-b-2 border-gray-100 text-[#2B208B]">
                        <tr>
                            <th class="py-4 px-2">หน้าปก</th>
                            <th class="py-4 px-2">ชื่อบทความ</th>
                            <th class="py-4 px-2">ผู้เขียน</th>
                            <th class="py-4 px-2 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="articles-table-body"></tbody>
                </table>
            </div>
        </div>
        <p id="status" class="mt-6 text-center font-bold text-lg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
    apiKey: "AIzaSyB4ANLAgK0X2Fg7vl9Wyt4wXYRdAymmtsI",
    authDomain: "cms-pct.firebaseapp.com",
    projectId: "cms-pct",
    storageBucket: "cms-pct.firebasestorage.app",
    messagingSenderId: "860939292294",
    appId: "1:860939292294:web:77ba2b10737b37ba3f4b07",
    measurementId: "G-SC2XP7JXL9"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- Auth Monitoring ---
        onAuthStateChanged(auth, (user) => {
            const loginSec = document.getElementById('login-section');
            const adminSec = document.getElementById('admin-section');
            if (user) {
                loginSec.classList.add('hidden');
                adminSec.classList.remove('hidden');
                document.getElementById('user-display').textContent = user.email;
                initListeners();
            } else {
                loginSec.classList.remove('hidden');
                adminSec.classList.add('hidden');
            }
        });

        // --- Login / Logout ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('login-error');
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                errBox.textContent = "❌ ล็อกอินไม่สำเร็จ กรุณาตรวจสอบสิทธิ์ Admin";
                errBox.classList.remove('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- Tab & Global Functions ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.classList.replace('text-[#2B208B]', 'text-gray-400');
                b.classList.remove('tab-active');
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.replace('text-gray-400', 'text-[#2B208B]');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        };

        window.deleteAuthor = async (id) => {
            if(confirm('ลบผู้เขียน?')) await deleteDoc(doc(db, "authors", id));
        };

        window.deleteArticle = async (id) => {
            if(confirm('ลบบทความ?')) await deleteDoc(doc(db, "articles", id));
        };

        // --- Realtime Listeners ---
        function initListeners() {
            onSnapshot(query(collection(db, "authors"), orderBy("name")), (snap) => {
                let options = '<option value="">-- กรุณาเลือกผู้เขียน --</option>';
                let list = '';
                snap.forEach(d => {
                    const data = d.data();
                    options += `<option value="${data.name}">${data.name}</option>`;
                    list += `<div class="flex items-center justify-between bg-white border p-3 rounded-2xl shadow-sm">
                                <div class="flex items-center space-x-3">
                                    <img src="${data.avatar}" class="w-10 h-10 rounded-full object-cover">
                                    <span class="font-bold text-[#2B208B] text-sm">${data.name}</span>
                                </div>
                                <button onclick="deleteAuthor('${d.id}')" class="text-red-400 hover:text-red-600 text-sm font-bold">ลบ</button>
                             </div>`;
                });
                document.getElementById('author-select').innerHTML = options;
                document.getElementById('authors-list').innerHTML = list;
            });

            onSnapshot(query(collection(db, "articles"), orderBy("createdAt", "desc")), (snap) => {
                let rows = '';
                snap.forEach(d => {
                    const data = d.data();
                    rows += `<tr class="border-b border-gray-50">
                                <td class="py-3"><img src="${data.image}" class="w-16 h-10 object-cover rounded"></td>
                                <td class="py-3 font-medium text-xs sm:text-sm">${data.title}</td>
                                <td class="py-3 text-xs text-gray-500">${data.author}</td>
                                <td class="py-3 text-center"><button onclick="deleteArticle('${d.id}')" class="text-red-500 text-sm">ลบ</button></td>
                             </tr>`;
                });
                document.getElementById('articles-table-body').innerHTML = rows;
            });
        }

        // --- Form Handling ---
        document.getElementById('author-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('author-submit-btn');
            btn.disabled = true;
            try {
                const file = document.getElementById('new-author-image').files[0];
                const sRef = ref(storage, `authors/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "authors"), { name: document.getElementById('new-author-name').value, avatar: url });
                e.target.reset();
                alert("เพิ่มผู้เขียนสำเร็จ");
            } catch (err) { alert("Error: " + err.message); } finally { btn.disabled = false; }
        });

        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = "⏳ กำลังประมวลผล...";
            try {
                const file = document.getElementById('image-file').files[0];
                const sRef = ref(storage, `articles/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "articles"), {
                    title: document.getElementById('title').value,
                    author: document.getElementById('author-select').value,
                    excerpt: document.getElementById('content').value,
                    link: document.getElementById('fb-link').value,
                    image: url,
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                status.textContent = "✅ อัปโหลดสำเร็จ!";
                setTimeout(() => { switchTab('list'); status.textContent = ""; }, 1000);
            } catch (err) { alert("Error: " + err.message); status.textContent = ""; } finally { btn.disabled = false; }
        });
    </script>
</body>
</html>
