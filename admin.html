<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | psyche.tourlife</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- ส่วน Login -->
    <div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Admin Login</h2>
        <form id="login-form" class="space-y-4">
            <input type="email" id="email" placeholder="อีเมลแอดมิน" class="w-full p-3 border rounded-xl outline-none" required>
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full p-3 border rounded-xl outline-none" required>
            <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition">เข้าสู่ระบบ</button>
            <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
        </form>
    </div>

    <!-- ส่วนจัดการข้อมูล (จะแสดงเมื่อล็อกอินแล้ว) -->
    <div id="admin-section" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">จัดการบทความ (Firebase)</h1>
            <button id="logout-btn" class="text-red-500 font-bold hover:underline">ออกจากระบบ</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 mb-10">
            <h3 class="text-lg font-bold mb-4 text-orange-600">เพิ่มบทความใหม่</h3>
            <form id="admin-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-1">ชื่อบทความ</label>
                    <input type="text" id="title" class="w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">ชื่อผู้เขียน</label>
                    <input type="text" id="author" class="w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">ลิงก์บทความฉบับเต็ม</label>
                    <input type="url" id="link" class="w-full p-3 border rounded-xl" placeholder="https://..." required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-1">เนื้อหาบทความ (แบบย่อ)</label>
                    <textarea id="content" rows="3" class="w-full p-3 border rounded-xl" required></textarea>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-1">รูปหน้าปก</label>
                    <input type="file" id="image-file" accept="image/*" class="w-full p-2 border border-dashed rounded-xl" required>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" id="submit-btn" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">อัปโหลดบทความ</button>
                </div>
            </form>
            <p id="status" class="mt-4 text-center font-bold"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-slate-600">
                    <tr>
                        <th class="p-4">รูป</th>
                        <th class="p-4">หัวข้อ</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="articles-table-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // ใช้ Config ของคุณที่เคยให้ไว้
        const firebaseConfig = {
            apiKey: "AIzaSyB4ANLAgK0X2Fg7vl9Wyt4wXYRdAymmtsI",
            authDomain: "cms-pct.firebaseapp.com",
            projectId: "cms-pct",
            storageBucket: "cms-pct.firebasestorage.app",
            messagingSenderId: "860939292294",
            appId: "1:860939292294:web:77ba2b10737b37ba3f4b07"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // ตรวจสอบสถานะการล็อกอิน
        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-section').classList.toggle('hidden', !!user);
            document.getElementById('admin-section').classList.toggle('hidden', !user);
            if (user) loadArticles();
        });

        // ล็อกอิน
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                document.getElementById('login-error').innerText = "ล็อกอินล้มเหลว ตรวจสอบอีเมล/รหัสผ่าน";
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        // ล็อกเอาท์
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // โหลดข้อมูลจาก Firebase
        function loadArticles() {
            onSnapshot(query(collection(db, "articles"), orderBy("createdAt", "desc")), (snap) => {
                let rows = '';
                snap.forEach(d => {
                    const data = d.data();
                    rows += `
                        <tr class="border-t border-gray-50">
                            <td class="p-4"><img src="${data.image}" class="w-16 h-10 object-cover rounded"></td>
                            <td class="p-4">
                                <div class="font-bold text-slate-800 text-sm">${data.title}</div>
                                <div class="text-xs text-gray-500">${data.author}</div>
                            </td>
                            <td class="p-4 text-center">
                                <button onclick="deleteArticle('${d.id}')" class="text-red-400 hover:text-red-600 text-sm">ลบ</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('articles-table-body').innerHTML = rows;
            });
        }

        window.deleteArticle = async (id) => {
            if(confirm('ต้องการลบบทความนี้?')) await deleteDoc(doc(db, "articles", id));
        };

        // บันทึกข้อมูล
        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = "⏳ กำลังประมวลผล...";

            try {
                const file = document.getElementById('image-file').files[0];
                const storageRef = ref(storage, `covers/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                await addDoc(collection(db, "articles"), {
                    title: document.getElementById('title').value,
                    author: document.getElementById('author').value,
                    excerpt: document.getElementById('content').value,
                    link: document.getElementById('link').value,
                    image: url,
                    createdAt: serverTimestamp()
                });

                e.target.reset();
                status.textContent = "✅ อัปโหลดสำเร็จ!";
                setTimeout(() => status.textContent = "", 3000);
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
